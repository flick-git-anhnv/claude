<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>AI Agent Team — 16 Vai Trò</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: #0d1117;
  color: #e6edf3;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
header {
  padding: 12px 20px;
  background: #161b22;
  border-bottom: 1px solid #30363d;
  display: flex;
  align-items: center;
  gap: 20px;
  flex-shrink: 0;
}
header h1 { font-size: 16px; font-weight: 600; color: #f0f6fc; }
.tabs { display: flex; gap: 4px; }
.tab {
  padding: 5px 14px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  color: #8b949e;
  border: 1px solid transparent;
  transition: all 0.15s;
}
.tab.active { background: #21262d; border-color: #30363d; color: #f0f6fc; }
.tab:hover:not(.active) { color: #e6edf3; }

.main { display: flex; flex: 1; overflow: hidden; }

/* ORG CHART */
#orgView {
  flex: 1;
  position: relative;
  overflow: auto;
}
#orgCanvas {
  position: relative;
  width: 1080px;
  min-height: 620px;
  margin: 0 auto;
}
#svgLines {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
}

.agent-node {
  position: absolute;
  width: 130px;
  padding: 8px 10px;
  border-radius: 8px;
  border: 1.5px solid;
  cursor: pointer;
  text-align: center;
  transition: transform 0.15s, box-shadow 0.15s;
  transform: translate(-50%, 0);
  user-select: none;
  z-index: 2;
}
.agent-node:hover { transform: translate(-50%, -2px); box-shadow: 0 6px 20px rgba(0,0,0,0.5); }
.agent-node.selected { box-shadow: 0 0 0 2px #fff, 0 6px 20px rgba(0,0,0,0.5); }
.agent-node .node-name { font-size: 12px; font-weight: 600; line-height: 1.3; }
.agent-node .node-level { font-size: 10px; opacity: 0.7; margin-top: 2px; }

/* Level colors */
.l1 { background: rgba(255,215,0,0.12); border-color: #FFD700; }
.l1 .node-name { color: #FFD700; }
.l2 { background: rgba(255,140,0,0.12); border-color: #FF8C00; }
.l2 .node-name { color: #FF9F40; }
.l3 { background: rgba(74,144,217,0.12); border-color: #4A90D9; }
.l3 .node-name { color: #79B8FF; }
.l4 { background: rgba(92,184,92,0.12); border-color: #5CB85C; }
.l4 .node-name { color: #7EE787; }
.l5 { background: rgba(155,89,182,0.12); border-color: #9B59B6; }
.l5 .node-name { color: #D2A8FF; }
.utility { background: rgba(232,184,75,0.12); border-color: #e8b84b; border-style: dashed; }
.utility .node-name { color: #e8b84b; }

.agent-node.highlighted { animation: pulse 0.6s ease; }
.agent-node.dimmed { opacity: 0.25; }
@keyframes pulse {
  0% { box-shadow: 0 0 0 0 rgba(255,255,255,0.5); }
  100% { box-shadow: 0 0 0 10px rgba(255,255,255,0); }
}

/* SIDE PANEL */
#sidePanel {
  width: 290px;
  background: #161b22;
  border-left: 1px solid #30363d;
  padding: 16px;
  overflow-y: auto;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
#sidePanel .panel-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: #8b949e; }
#agentDetail { flex: 1; }
#agentDetail .detail-name { font-size: 17px; font-weight: 700; margin-bottom: 4px; }
#agentDetail .detail-level { font-size: 11px; color: #8b949e; margin-bottom: 12px; }
#agentDetail .detail-section { margin-bottom: 12px; }
#agentDetail .detail-section h4 { font-size: 11px; font-weight: 600; color: #8b949e; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 5px; }
#agentDetail .detail-section p { font-size: 12px; line-height: 1.5; color: #c9d1d9; }
.tool-badge {
  display: inline-block;
  background: #21262d;
  border: 1px solid #30363d;
  border-radius: 4px;
  padding: 2px 7px;
  font-size: 10px;
  color: #8b949e;
  margin: 2px;
}
.model-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
  margin-top: 2px;
}
.model-opus  { background: rgba(255,215,0,0.1);  border: 1px solid #FFD700; color: #FFD700; }
.model-sonnet{ background: rgba(88,166,255,0.1); border: 1px solid #58a6ff; color: #79b8ff; }
.placeholder-text { font-size: 12px; color: #484f58; text-align: center; margin-top: 40px; line-height: 1.8; }

/* WORKFLOW VIEW */
#workflowView {
  flex: 1;
  display: none;
  flex-direction: row;
  overflow: hidden;
}
.workflow-left {
  width: 200px;
  background: #161b22;
  border-right: 1px solid #30363d;
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  overflow-y: auto;
  flex-shrink: 0;
}
.workflow-left h3 { font-size: 11px; font-weight: 600; color: #8b949e; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
.wf-group-label {
  font-size: 10px;
  color: #484f58;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-top: 8px;
  margin-bottom: 2px;
  padding-left: 2px;
}
.flow-btn {
  padding: 8px 10px;
  border-radius: 6px;
  border: 1px solid #30363d;
  background: #21262d;
  color: #c9d1d9;
  cursor: pointer;
  font-size: 12px;
  text-align: left;
  transition: all 0.15s;
  line-height: 1.3;
}
.flow-btn:hover { border-color: #58a6ff; color: #f0f6fc; }
.flow-btn.active { border-color: #58a6ff; background: #1c2b3a; color: #79b8ff; }
.flow-btn .flow-id { font-size: 10px; opacity: 0.6; display: block; margin-bottom: 1px; }

.workflow-main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.workflow-header {
  padding: 14px 20px;
  border-bottom: 1px solid #30363d;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.workflow-header h2 { font-size: 14px; font-weight: 600; }
.play-btn {
  padding: 6px 16px;
  background: #238636;
  border: 1px solid #2ea043;
  border-radius: 6px;
  color: #fff;
  cursor: pointer;
  font-size: 12px;
  font-weight: 600;
  transition: background 0.15s;
}
.play-btn:hover { background: #2ea043; }
.play-btn:disabled { opacity: 0.5; cursor: not-allowed; }

.workflow-steps {
  flex: 1;
  overflow-y: auto;
  padding: 16px 20px;
  display: flex;
  flex-direction: column;
  gap: 0;
}
.step {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 10px 0;
  opacity: 0.3;
  transition: opacity 0.4s;
  border-bottom: 1px solid #21262d;
}
.step.active { opacity: 1; }
.step.done { opacity: 0.7; }
.step-num {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  background: #21262d;
  border: 1px solid #30363d;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: 700;
  flex-shrink: 0;
  color: #8b949e;
}
.step.active .step-num { background: #58a6ff; border-color: #58a6ff; color: #fff; }
.step.done .step-num { background: #238636; border-color: #2ea043; color: #fff; }
.step-content { flex: 1; }
.step-agents {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 3px;
  flex-wrap: wrap;
}
.agent-chip {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 600;
  border: 1px solid;
}
.step-note {
  display: inline-block;
  font-size: 10px;
  color: #58a6ff;
  background: rgba(88,166,255,0.08);
  border: 1px solid rgba(88,166,255,0.2);
  border-radius: 4px;
  padding: 1px 6px;
  margin-left: 4px;
}
.arrow-icon { color: #58a6ff; font-size: 14px; }
.step-msg { font-size: 12px; color: #8b949e; }

/* LEGEND */
.legend {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  padding: 10px 0;
  border-top: 1px solid #30363d;
  margin-top: auto;
}
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #8b949e; }
.legend-dot { width: 8px; height: 8px; border-radius: 50%; }
</style>
</head>

      <button class="flow-btn" onclick="loadWorkflow('refactor', this)">

      </button>
    </div>
    <div class="workflow-main">
      <div class="workflow-header">

        <button class="play-btn" id="playBtn" onclick="playWorkflow()">▶ Play</button>
      </div>
      <div class="workflow-steps" id="workflowSteps"></div>
    </div>
  </div>

</div>

// ─── ORG CHART RENDER ─────────────────────────────────────────────────────────
function renderOrgChart() {
  const canvas = document.getElementById('orgCanvas');
  const svg = document.getElementById('svgLines');
  const NODE_H = 52;

  const maxY = Math.max(...AGENTS.map(a => a.y)) + NODE_H + 40;
  canvas.style.height = (maxY + 60) + 'px';
  svg.setAttribute('viewBox', `0 0 1080 ${maxY + 60}`);
  svg.style.height = (maxY + 60) + 'px';

  let linesHTML = '';
  AGENTS.forEach(agent => {
    if (!agent.parent) return;
    const parent = AGENT_MAP[agent.parent];
    const x1 = parent.x, y1 = parent.y + NODE_H;
    const x2 = agent.x, y2 = agent.y;
    const midY = (y1 + y2) / 2;
    linesHTML += `<path d="M${x1},${y1} C${x1},${midY} ${x2},${midY} ${x2},${y2}"
      stroke="#30363d" stroke-width="1.5" fill="none"
      id="line-${agent.id}" class="edge-line"/>`;
  });
  svg.innerHTML = linesHTML;

  AGENTS.forEach(agent => {
    const div = document.createElement('div');
    div.className = `agent-node ${agent.colorClass}`;
    div.id = `node-${agent.id}`;
    div.style.left = agent.x + 'px';
    div.style.top = agent.y + 'px';
    div.innerHTML = `<div class="node-name">${agent.name.replace('\n', '<br>')}</div><div class="node-level">${agent.levelLabel.split('·')[0].trim()}</div>`;
    div.onclick = () => selectAgent(agent.id);
    canvas.appendChild(div);
  });
}

function selectAgent(id) {
  document.querySelectorAll('.agent-node').forEach(n => n.classList.remove('selected'));
  document.getElementById(`node-${id}`).classList.add('selected');

  const a = AGENT_MAP[id];
  const toolBadges = a.tools.map(t => `<span class="tool-badge">${t}</span>`).join('');
  const modelClass = a.modelTier === 'opus' ? 'model-opus' : 'model-sonnet';
  const modelLabel = a.modelTier === 'opus' ? '◆ Opus 4.7' : '◇ Sonnet 4.6';

  document.getElementById('agentDetail').innerHTML = `
    <div class="detail-name" style="color:${a.color}">${a.fullName}</div>
    <div class="detail-level">${a.levelLabel}</div>
    <div class="detail-section">
      <h4>Vai trò</h4>
      <p>${a.description}</p>
    </div>
    <div class="detail-section">
      <h4>Khi nào gọi</h4>
      <p>${a.when}</p>
    </div>
    <div class="detail-section">
      <h4>Model AI</h4>
      <span class="model-badge ${modelClass}">${modelLabel}</span>
    </div>
    <div class="detail-section">
      <h4>Tools</h4>
      <div>${toolBadges}</div>
    </div>
  `;
}

  currentFlow = id;
  currentStep = -1;

  document.querySelectorAll('.flow-btn').forEach(b => b.classList.remove('active'));
  if (btnEl) btnEl.classList.add('active');

  const wf = WORKFLOWS[id];
  document.getElementById('workflowTitle').textContent = wf.title;

  const container = document.getElementById('workflowSteps');
  container.innerHTML = wf.steps.map((step, i) => {
    const fromChip = getChipHTML(step.from);
    const toChip = getChipHTML(step.to);
    const arrow = step.from && step.from !== step.to ? `<span class="arrow-icon">→</span>${toChip}` : '';
    const noteHTML = step.note ? `<span class="step-note">${step.note}</span>` : '';
    return `
      <div class="step" id="step-${i}">
        <div class="step-num">${i + 1}</div>
        <div class="step-content">
          <div class="step-agents">${fromChip}${arrow}${noteHTML}</div>
          <div class="step-msg">${step.msg}</div>
        </div>
      </div>`;
  }).join('');

  document.getElementById('playBtn').disabled = false;
  document.getElementById('playBtn').textContent = '▶ Play';
}

function playWorkflow() {
  const btn = document.getElementById('playBtn');
  if (playInterval) { stopPlay(); return; }
  if (currentStep >= WORKFLOWS[currentFlow].steps.length - 1) {
    currentStep = -1;
    document.querySelectorAll('.step').forEach(s => s.classList.remove('active', 'done'));
  }
  btn.textContent = '⏹ Stop';
  playInterval = setInterval(() => {
    if (currentStep >= 0) {
      document.getElementById(`step-${currentStep}`).classList.remove('active');
      document.getElementById(`step-${currentStep}`).classList.add('done');
    }
    currentStep++;
    const steps = WORKFLOWS[currentFlow].steps;
    if (currentStep >= steps.length) { stopPlay(); return; }
    const stepEl = document.getElementById(`step-${currentStep}`);
    stepEl.classList.add('active');
    stepEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }, 900);
}

function stopPlay() {
  if (playInterval) { clearInterval(playInterval); playInterval = null; }
  const btn = document.getElementById('playBtn');
  if (btn) btn.textContent = currentStep >= WORKFLOWS[currentFlow].steps.length - 1 ? '↺ Replay' : '▶ Play';
}

// ─── TAB SWITCHING ────────────────────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  if (tab === 'org') {
    document.getElementById('orgView').style.display = 'block';
    document.getElementById('sidePanel').style.display = 'flex';
    document.getElementById('workflowView').style.display = 'none';
  } else {
    document.getElementById('orgView').style.display = 'none';
    document.getElementById('sidePanel').style.display = 'none';
    document.getElementById('workflowView').style.display = 'flex';
  }
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
renderOrgChart();
document.getElementById('workflowView').style.display = 'flex';
loadWorkflow('feature', document.querySelector('.flow-btn'));
document.getElementById('workflowView').style.display = 'none';
</script>
